<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字人程序 - 登录</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>数字人程序</h1>
                <p>请登录您的账号</p>
            </div>
            
            <!-- 登录方式切换标签 -->
            <div class="login-tabs">
                <button type="button" class="tab-btn active" data-tab="password">密码登录</button>
                <button type="button" class="tab-btn" data-tab="sms">验证码登录</button>
            </div>

            <!-- 密码登录表单 -->
            <form id="passwordLoginForm" class="login-form active">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                    <div class="error-message" id="usernameError"></div>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" placeholder="请输入密码" required>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <span class="show">👁️</span>
                            <span class="hide">🙈</span>
                        </button>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>记住密码</span>
                    </label>
                    <a href="#" class="forgot-password">忘记密码？</a>
                </div>
                
                <button type="submit" class="login-btn">登录</button>
            </form>

            <!-- 手机验证码登录表单 -->
            <form id="smsLoginForm" class="login-form">
                <div class="form-group">
                    <label for="phone">手机号</label>
                    <input type="tel" id="phone" name="phone" placeholder="请输入手机号" required>
                    <div class="error-message" id="phoneError"></div>
                </div>
                
                <div class="form-group">
                    <label for="smsCode">验证码</label>
                    <div class="sms-input">
                        <input type="text" id="smsCode" name="smsCode" placeholder="请输入验证码" required>
                        <button type="button" class="send-sms-btn" id="sendSmsBtn">获取验证码</button>
                    </div>
                    <div class="error-message" id="smsCodeError"></div>
                </div>
                
                <button type="submit" class="login-btn">登录</button>
            </form>

            <div class="register-link">
                <p>还没有账号？<a href="#">立即注册</a></p>
            </div>
            
            <div class="system-message" id="systemMessage"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
