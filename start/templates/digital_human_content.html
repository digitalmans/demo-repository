// ==================== WAV 音频录制器 ====================
class WAVRecorder {
    constructor() {
        this.audioContext = null;
        this.scriptProcessor = null;
        this.mediaStreamSource = null;
        this.recordedSamples = [];
        this.sampleRate = 16000;
        this.stream = null;
    }

    async start() {
        this.recordedSamples = [];
        this.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        this.audioContext = new AudioContextClass({ sampleRate: this.sampleRate });
        this.mediaStreamSource = this.audioContext.createMediaStreamSource(this.stream);
        
        this.scriptProcessor = this.audioContext.createScriptProcessor(4096, 1, 1);
        
        this.scriptProcessor.onaudioprocess = (e) => {
            const inputData = e.inputBuffer.getChannelData(0);
            this.recordedSamples.push(new Float32Array(inputData));
        };
        
        this.mediaStreamSource.connect(this.scriptProcessor);
        this.scriptProcessor.connect(this.audioContext.destination);
    }

    async stop() {
        if (this.scriptProcessor) this.scriptProcessor.disconnect();
        if (this.mediaStreamSource) this.mediaStreamSource.disconnect();
        if (this.audioContext) await this.audioContext.close();
        if (this.stream) this.stream.getTracks().forEach(track => track.stop());

        const totalLength = this.recordedSamples.reduce((acc, val) => acc + val.length, 0);
        const mergedBuffer = new Float32Array(totalLength);
        let offset = 0;
        for (const chunk of this.recordedSamples) {
            mergedBuffer.set(chunk, offset);
            offset += chunk.length;
        }

        const wavBuffer = this.encodeWAV(mergedBuffer, this.sampleRate);
        return new Blob([wavBuffer], { type: 'audio/wav' });
    }

    encodeWAV(samples, sampleRate) {
        const buffer = new ArrayBuffer(44 + samples.length * 2);
        const view = new DataView(buffer);

        this.writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + samples.length * 2, true);
        this.writeString(view, 8, 'WAVE');
        this.writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        this.writeString(view, 36, 'data');
        view.setUint32(40, samples.length * 2, true);

        let index = 44;
        for (let i = 0; i < samples.length; i++) {
            const s = Math.max(-1, Math.min(1, samples[i]));
            view.setInt16(index, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            index += 2;
        }

        return buffer;
    }

    writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
        }
    }
}

// ==================== 3D 数字人逻辑 ====================
let scene, camera, renderer, model, mixer, controls;
let isTalking = false;
let mouthAnimationTimer = 0;
let defaultDeepseekPreset = '{{ default_deepseek_preset }}';

function initDigitalHuman() {
    const container = document.getElementById('canvas-container');
    if (!container) return;

    // Scene
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    scene.fog = new THREE.FogExp2(0xffffff, 0.15);

    // Camera
    camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(0, 1.4, 2.5);

    // Renderer
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // Controls
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2 + 0.1;
    controls.minDistance = 1;
    controls.maxDistance = 5;
    controls.target.set(0, 1.1, 0);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight1.position.set(2, 4, 3);
    dirLight1.castShadow = true;
    scene.add(dirLight1);

    // Colored accent lights (Sci-fi feel) - Commented out for white theme
    // const blueLight = new THREE.PointLight(0x00ffff, 2, 8);
    // blueLight.position.set(-1.5, 1.2, 0.5);
    // scene.add(blueLight);

    // const purpleLight = new THREE.PointLight(0x764ba2, 2, 8);
    // purpleLight.position.set(1.5, 1.2, 0.5);
    // scene.add(purpleLight);

    const rimLight = new THREE.PointLight(0xffffff, 1, 5);
    rimLight.position.set(0, 2.5, -1.5);
    scene.add(rimLight);

    // Ground shadow helper - Black grid
    const gridHelper = new THREE.GridHelper(10, 20, 0x000000, 0x888888);
    gridHelper.position.y = 0.01;
    gridHelper.material.opacity = 0.25;
    gridHelper.material.transparent = true;
    scene.add(gridHelper);

    // Loader
    const loader = new THREE.GLTFLoader();
    loader.load('/static/models/robot.glb', function(gltf) {
        model = gltf.scene;
        
        // Adjust sizing (Auto-scale to a standard target height of 1.6 meters)
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const targetHeight = 1.6;
        const scaleFactor = targetHeight / (size.y || 1);
        model.scale.set(scaleFactor, scaleFactor, scaleFactor);
        
        // Recalculate bounding box after scaling to center correctly
        const newBox = new THREE.Box3().setFromObject(model);
        const newCenter = newBox.getCenter(new THREE.Vector3());
        
        // Center the model horizontally, place feet on ground (Y=0)
        model.position.x = -newCenter.x;
        model.position.y = -newBox.min.y;
        model.position.z = -newCenter.z;
        
        model.traverse(function(child) {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
                // Add metallic look to make robot look premium
                if (child.material) {
                    child.material.roughness = 0.3;
                    child.material.metalness = 0.8;
                }
            }
        });

        scene.add(model);

        // Setup idle animations
        if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(model);
            const idleAction = mixer.clipAction(gltf.animations[0]);
            idleAction.play();
        }

        document.getElementById('model-loading').style.display = 'none';
        animate();
    }, function(xhr) {
        if (xhr.total > 0) {
            const percent = Math.round((xhr.loaded / xhr.total) * 100);
            document.getElementById('loading-percentage').innerText = percent + '%';
        }
    }, function(error) {
        console.error('Error loading GLB:', error);
        document.getElementById('model-loading').innerHTML = '<p style="color: #ff3333;">❌ 模型载入失败，请查看控制台报错</p>';
    });

    window.addEventListener('resize', onResize);
}

function onResize() {
    const container = document.getElementById('canvas-container');
    if (!container) return;
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
}

const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const elapsedTime = clock.getElapsedTime();

    if (mixer) mixer.update(delta);
    if (controls) controls.update();

    if (model) {
        // Idle breathing and micro-nodding motion
        if (!isTalking) {
            model.position.y = Math.sin(elapsedTime * 1.5) * 0.01;
            // Rotate head slightly
            const head = model.getObjectByName('head') || model.getObjectByName('Head');
            if (head) {
                head.rotation.y = Math.sin(elapsedTime * 0.4) * 0.05;
                head.rotation.x = Math.sin(elapsedTime * 0.8) * 0.02;
            }
        } else {
            // Talking animation: mouth/jaw modulation & head nodding
            model.position.y = Math.sin(elapsedTime * 8) * 0.005;
            
            const head = model.getObjectByName('head') || model.getObjectByName('Head');
            if (head) {
                head.rotation.x = (Math.sin(elapsedTime * 12) * 0.04) + 0.02; // dynamic nod
                head.rotation.y = Math.sin(elapsedTime * 3) * 0.06;
            }
            
            // Speak mouth animation using scaling
            const mouth = model.getObjectByName('mouth') || model.getObjectByName('Mouth') || 
                          model.getObjectByName('jaw') || model.getObjectByName('Jaw');
            if (mouth && mouth !== model) {
                mouth.scale.z = 1 + Math.sin(elapsedTime * 20) * 0.25;
                mouth.position.y = Math.sin(elapsedTime * 20) * 0.015;
            } else {
                // Fallback body scale modulation (relative to model scale)
                model.scale.y = model.scale.x * (1 + Math.sin(elapsedTime * 20) * 0.008);
            }
        }
    }

    renderer.render(scene, camera);
}

// ==================== 语音交互与后台API ====================
let wavRecorder = null;
let isRecording = false;
let currentAudio = null;

function updateStatus(text, color = '#4CAF50') {

    const statusText = document.getElementById('dh-status-text');

function appendMessage(sender, text) {

    msgDiv.style.display = 'flex';
    msgDiv.style.flexDirection = 'column';
    msgDiv.style.maxWidth = '85%';
    
    if (sender === 'user') {
        msgDiv.style.alignSelf = 'flex-end';

        msgDiv.style.borderRadius = '12px 12px 0 12px';
        msgDiv.style.border = 'none';
        msgDiv.style.padding = '12px 18px';
    } else {
        msgDiv.style.alignSelf = 'flex-start';
        msgDiv.style.background = '#f0f0f4';
        msgDiv.style.borderRadius = '12px 12px 12px 0';
        msgDiv.style.border = '1px solid #e0e0ea';
        msgDiv.style.padding = '12px 18px';
    }

    const textDiv = document.createElement('div');
    textDiv.style.fontSize = '0.95em';
    textDiv.style.lineHeight = '1.5';
    textDiv.style.color = sender === 'user' ? '#ffffff' : '#333333';
    textDiv.innerText = text;

    msgDiv.appendChild(textDiv);
    chatContainer.appendChild(msgDiv);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

// 语音合成与播报驱动
async function speakResponse(text) {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
    }
    const videoEl = document.getElementById('dh-2d-video');
    if (videoEl) {
        videoEl.pause();
        videoEl.src = '';
    }
    isTalking = false;
    document.getElementById('dh-2d-avatar').style.opacity = '1';

    const speaker = document.getElementById('dh-speaker-select').value;
    updateStatus('正在思考并合成双数字人语音...', '#FF9800');

    try {
        // 尝试调用 2D 数字人 Wav2Lip 视频合成接口
        const response = await fetch('/api/digital_human/wav2lip', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                text: text,
                speaker: parseInt(speaker)
            })
        });

        if (response.ok) {
            const data = await response.json();
            if (data.success && data.video_url) {
                const isVideo = data.media_type === 'mp4';
                document.getElementById('dh-2d-avatar').style.opacity = isVideo ? '0' : '1';
                videoEl.src = data.video_url;
                
                videoEl.onplay = () => {
                    isTalking = true;
                    updateStatus('正在发声... (🗣️)', '#00ffff');
                };

                videoEl.onended = () => {
                    isTalking = false;
                    updateStatus('空闲 (💤)', '#4CAF50');
                    resetModelNodes();
                    document.getElementById('dh-2d-avatar').style.opacity = '1';
                };

                videoEl.onerror = () => {
                    isTalking = false;
                    updateStatus('2D数字人播放异常', '#f44336');
                    document.getElementById('dh-2d-avatar').style.opacity = '1';
                };

                videoEl.play();
                return;
            }
        }
    } catch (wav2lipErr) {
        console.warn('Wav2Lip 合成失败，正在回退到标准 TTS:', wav2lipErr);
    }

    // 回退到标准 TTS
    updateStatus('Wav2Lip 未就绪，已回退到标准 3D 播报...', '#FF9800');
    try {
        const response = await fetch('/api/voice/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                text: text,
                language: 'zh',
                speaker: parseInt(speaker)
            })
        });

        if (!response.ok) {
            throw new Error('TTS 请求失败');
        }

        const blob = await response.blob();
        const audioUrl = URL.createObjectURL(blob);
        currentAudio = new Audio(audioUrl);

        currentAudio.onplay = () => {
            isTalking = true;
            updateStatus('正在说话... (🗣️)', '#00ffff');
        };

        currentAudio.onended = () => {
            isTalking = false;
            updateStatus('空闲 (💤)', '#4CAF50');
            resetModelNodes();
        };

        currentAudio.onerror = () => {
            isTalking = false;
            updateStatus('语音播放错误', '#f44336');
        };

        currentAudio.play();

    } catch (err) {
        console.error('语音合成出错:', err);
        updateStatus('语音合成失败', '#f44336');
    }
}

function resetModelNodes() {
    if (model) {
        const mouth = model.getObjectByName('mouth') || model.getObjectByName('Mouth') || 
                      model.getObjectByName('jaw') || model.getObjectByName('Jaw');
        if (mouth && mouth !== model) {
            mouth.scale.z = 1;
            mouth.position.y = 0;
        }
        model.scale.y = model.scale.x;
    }
}

// 发送文本问题
async function sendTextInput() {
    const inputField = document.getElementById('dh-text-input');
    const text = inputField.value.trim();
    if (!text) return;

    inputField.value = '';
    appendMessage('user', text);
    updateStatus('机器人思考中...', '#FF9800');

    try {
        const response = await fetch('/api/qa_robot/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                question: text,
                preset: defaultDeepseekPreset || 'deepseek_qa',
                deepseek_api_key: localStorage.getItem('qa_robot_deepseek_api_key') || '',
                force_deepseek: true
            })
        });

        const data = await response.json();
        if (data.success && data.answer) {
            appendMessage('assistant', data.answer);
            speakResponse(data.answer);
        } else {
            const errText = data.error || '未能获得答案，请重试';
            appendMessage('assistant', `抱歉：${errText}`);
            updateStatus('空闲 (💤)', '#4CAF50');
        }
    } catch (err) {
        console.error(err);
        appendMessage('assistant', '网络出错，请确认后端服务运行正常');
        updateStatus('错误', '#f44336');
    }
}

// 录音触发与语音识别逻辑
async function toggleVoiceRecording() {
    const micBtn = document.getElementById('dh-mic-btn');
    const speechTemp = document.getElementById('dh-speech-temp-text');
    
    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
        isTalking = false;
        resetModelNodes();
    }

    if (!isRecording) {
        // 开始录音
        try {
            if (!wavRecorder) {
                wavRecorder = new WAVRecorder();
            }
            await wavRecorder.start();
            isRecording = true;
            micBtn.classList.add('recording');
            updateStatus('正在聆听... (🎤)', '#f44336');
            speechTemp.innerText = '正在说话中...';
            speechTemp.style.display = 'block';
        } catch (err) {
            console.error('麦克风授权失败:', err);
            updateStatus('获取麦克风失败', '#f44336');
            alert('请确保麦克风有访问权限！');
        }
    } else {
        // 停止录音并处理 ASR
        isRecording = false;
        micBtn.classList.remove('recording');
        updateStatus('正在进行语音识别...', '#FF9800');
        speechTemp.innerText = '正在处理转录...';
        
        try {
            const audioBlob = await wavRecorder.stop();
            const formData = new FormData();
            formData.append('audio', audioBlob, 'voice.wav');
            
            const response = await fetch('/api/voice/asr', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            if (data.success && data.result) {
                const queryText = data.result.trim();
                speechTemp.style.display = 'none';
                if (queryText) {
                    // 追加用户问题
                    appendMessage('user', queryText);
                    // 问答逻辑
                    updateStatus('正在分析问题...', '#FF9800');
                    const qaResponse = await fetch('/api/qa_robot/ask', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            question: queryText,
                            preset: defaultDeepseekPreset || 'deepseek_qa',
                            deepseek_api_key: localStorage.getItem('qa_robot_deepseek_api_key') || '',
                            force_deepseek: true
                        })
                    });
                    const qaData = await qaResponse.json();
                    if (qaData.success && qaData.answer) {
                        appendMessage('assistant', qaData.answer);
                        speakResponse(qaData.answer);
                    } else {
                        appendMessage('assistant', `抱歉：${qaData.error || '无法处理'}`);
                        updateStatus('空闲 (💤)', '#4CAF50');
                    }
                } else {
                    updateStatus('未能识别到有效语音', '#FF9800');
                    setTimeout(() => updateStatus('空闲 (💤)', '#4CAF50'), 2000);
                }
            } else {
                speechTemp.innerText = '转录失败';
                updateStatus('语音转录失败', '#f44336');
                setTimeout(() => {
                    speechTemp.style.display = 'none';
                    updateStatus('空闲 (💤)', '#4CAF50');
                }, 2000);
            }
        } catch (err) {
            console.error('ASR 请求出错:', err);
            speechTemp.innerText = '网络连接出错';
            updateStatus('网络连接出错', '#f44336');
            setTimeout(() => {
                speechTemp.style.display = 'none';
                updateStatus('空闲 (💤)', '#4CAF50');
            }, 2000);
        }
    }
}

function initDigitalHumanModule() {
    initDigitalHuman();

    // 绑定发送按钮
    const sendBtn = document.getElementById('dh-send-btn');
    if (sendBtn) sendBtn.addEventListener('click', sendTextInput);
    
    // 绑定回车键
    const textInput = document.getElementById('dh-text-input');
    if (textInput) {
        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendTextInput();
            }
        });
    }

    // 绑定麦克风语音按钮
    const micBtn = document.getElementById('dh-mic-btn');
    if (micBtn) micBtn.addEventListener('click', toggleVoiceRecording);
}
initDigitalHumanModule();
})();
</script>
