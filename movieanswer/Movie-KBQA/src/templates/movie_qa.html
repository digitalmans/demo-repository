<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影问答机器人</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 电影问答机器人</h1>
            <p class="subtitle">基于检索式问答系统 - 提出问题，获得答案</p>
        </header>

        <div class="main-content">
            <!-- 左侧检索栏 -->
            <div class="search-sidebar">
                <div class="search-card">
                    <h2>💬 提问</h2>
                    <div class="input-group">
                        <textarea 
                            id="question-input" 
                            rows="4" 
                            placeholder="请输入您的问题，例如：&#10;• 李连杰演过什么电影？&#10;• 英雄的评分是多少？&#10;• 巩俐的简介是什么？"
                        ></textarea>
                    </div>
                    <button class="btn btn-primary" id="send-btn" onclick="sendQuestion()">
                        <span class="btn-text">发送</span>
                        <span class="btn-loading" style="display: none;">思考中...</span>
                    </button>
                    <button class="btn btn-secondary" id="clear-btn" onclick="clearChat()">清空对话</button>
                    
                    <div class="hint-box">
                        <p class="hint-title">💡 提示</p>
                        <ul class="hint-list">
                            <li>可以询问电影评分、上映时间</li>
                            <li>可以查询演员信息和作品</li>
                            <li>可以了解电影类型和简介</li>
                        </ul>
                    </div>
                </div>

                <div class="stats-card" id="stats-card">
                    <h3>📊 统计信息</h3>
                    <div class="stats-content" id="stats-content">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>

            <!-- 右侧对话区域 -->
            <div class="chat-area">
                <div class="chat-header">
                    <h2>对话历史</h2>
                    <span class="message-count" id="message-count">0 条消息</span>
                </div>
                
                <div class="chat-messages" id="chat-messages">
                    <div class="welcome-message">
                        <div class="welcome-icon">👋</div>
                        <h3>欢迎使用电影问答机器人！</h3>
                        <p>我是您的电影知识助手，可以回答关于电影、演员等相关问题。</p>
                        <p>请在左侧输入您的问题，我会尽力为您解答。</p>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>基于检索式问答系统 | 电影问答机器人 v1.0</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
