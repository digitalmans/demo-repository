<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影问答机器人 - 检索式问答系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .input-area button:hover {
            transform: translateY(-2px);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        .qa-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .qa-item .question {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .qa-item .answer {
            color: #666;
            font-size: 0.9em;
        }

        .qa-item .category {
            display: inline-block;
            padding: 4px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 0.8em;
            margin-top: 8px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .stat-card {
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-card .label {
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 电影问答机器人</h1>
            <p>基于检索式问答系统 - 提出问题，获得答案</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('chat')">💬 对话</button>
            <button class="tab-btn" onclick="switchTab('manage')">📚 管理</button>
            <button class="tab-btn" onclick="switchTab('stats')">📊 统计</button>
        </div>

        <!-- 对话标签页 -->
        <div id="chat-tab" class="tab-content active">
            <div class="chat-area" id="chat-area">
                <div class="message bot">
                    <div class="message-content">
                        您好！我是电影问答机器人，可以回答关于电影、演员等相关问题。请开始提问吧！
                    </div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="question-input" placeholder="请输入您的问题..." onkeypress="handleKeyPress(event)">
                <button id="send-btn" onclick="sendQuestion()">发送</button>
            </div>
        </div>

        <!-- 管理标签页 -->
        <div id="manage-tab" class="tab-content">
            <h3 style="margin-bottom: 15px;">添加问答对</h3>
            <div style="margin-bottom: 20px;">
                <input type="text" id="add-question" placeholder="问题" style="width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #e0e0e0; border-radius: 5px;">
                <textarea id="add-answer" placeholder="答案" rows="3" style="width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #e0e0e0; border-radius: 5px;"></textarea>
                <button onclick="addQA()" style="width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">添加</button>
            </div>

            <h3 style="margin-bottom: 15px;">问答对列表</h3>
            <div id="qa-list">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 统计标签页 -->
        <div id="stats-tab" class="tab-content">
            <div id="stats-content">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // 标签页切换
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
            
            if (tab === 'manage') {
                loadQAList();
            } else if (tab === 'stats') {
                loadStats();
            }
        }

        // 发送问题
        async function sendQuestion() {
            const input = document.getElementById('question-input');
            const question = input.value.trim();
            
            if (!question) {
                return;
            }
            
            // 显示用户消息
            addMessage(question, 'user');
            input.value = '';
            
            // 禁用按钮
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;
            sendBtn.textContent = '思考中...';
            
            // 显示加载消息
            const loadingId = addMessage('正在思考...', 'bot');
            
            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question: question })
                });
                
                const data = await response.json();
                
                // 移除加载消息
                document.getElementById(loadingId).remove();
                
                if (data.success) {
                    addMessage(data.answer, 'bot');
                } else {
                    addMessage('抱歉，发生了错误: ' + data.error, 'bot');
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                addMessage('网络错误: ' + error.message, 'bot');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
            }
        }

        // 添加消息
        function addMessage(text, type) {
            const chatArea = document.getElementById('chat-area');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.id = 'msg-' + Date.now();
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            
            return messageDiv.id;
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendQuestion();
            }
        }

        // 添加问答对
        async function addQA() {
            const question = document.getElementById('add-question').value.trim();
            const answer = document.getElementById('add-answer').value.trim();
            
            if (!question || !answer) {
                alert('问题和答案不能为空');
                return;
            }
            
            try {
                const response = await fetch('/api/qa/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question: question, answer: answer })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('添加成功！');
                    document.getElementById('add-question').value = '';
                    document.getElementById('add-answer').value = '';
                    loadQAList();
                } else {
                    alert('添加失败: ' + data.error);
                }
            } catch (error) {
                alert('网络错误: ' + error.message);
            }
        }

        // 加载问答对列表
        async function loadQAList() {
            const qaList = document.getElementById('qa-list');
            qaList.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetch('/api/qa/list?limit=20');
                const data = await response.json();
                
                if (data.success) {
                    if (data.qa_pairs.length === 0) {
                        qaList.innerHTML = '<p>暂无问答对</p>';
                    } else {
                        qaList.innerHTML = data.qa_pairs.map(qa => `
                            <div class="qa-item">
                                <div class="question">Q: ${qa.question}</div>
                                <div class="answer">A: ${qa.answer}</div>
                                <span class="category">${qa.category}</span>
                            </div>
                        `).join('');
                    }
                } else {
                    qaList.innerHTML = '<p>加载失败: ' + data.error + '</p>';
                }
            } catch (error) {
                qaList.innerHTML = '<p>网络错误: ' + error.message + '</p>';
            }
        }

        // 加载统计信息
        async function loadStats() {
            const statsContent = document.getElementById('stats-content');
            statsContent.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                if (data.success) {
                    const stats = data.stats;
                    statsContent.innerHTML = `
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="value">${stats.total_qa_pairs}</div>
                                <div class="label">问答对数</div>
                            </div>
                            <div class="stat-card">
                                <div class="value">${stats.total_movies}</div>
                                <div class="label">电影数量</div>
                            </div>
                            <div class="stat-card">
                                <div class="value">${stats.total_persons}</div>
                                <div class="label">演员数量</div>
                            </div>
                            <div class="stat-card">
                                <div class="value">${stats.total_genres}</div>
                                <div class="label">类型数量</div>
                            </div>
                        </div>
                        <h3 style="margin-top: 30px; margin-bottom: 15px;">类别分布</h3>
                        <div>
                            ${Object.entries(stats.categories).map(([cat, count]) => `
                                <div style="padding: 10px; margin-bottom: 5px; background: #f8f9ff; border-radius: 5px;">
                                    <strong>${cat}</strong>: ${count} 条
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    statsContent.innerHTML = '<p>加载失败: ' + data.error + '</p>';
                }
            } catch (error) {
                statsContent.innerHTML = '<p>网络错误: ' + error.message + '</p>';
            }
        }

        // 页面加载时加载问答列表
        window.onload = function() {
            loadQAList();
        };
    </script>
</body>
</html>
