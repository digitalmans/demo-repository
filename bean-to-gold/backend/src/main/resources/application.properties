server.port=8085

spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=12MB

# Agnes AI：密钥只从环境变量 AGNES_API_KEY 读取，勿提交真实密钥到 Git
agnes.api-key=${AGNES_API_KEY:}
agnes.api-base=https://apihub.agnes-ai.com/v1
agnes.text-model=agnes-2.0-flash
agnes.image-model=agnes-image-2.1-flash
agnes.image-size=1024x1024

# 前端开发地址（逗号分隔）
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

logging.level.com.hackathon.moodpixel=INFO
